<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原谅我好不好？</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      overflow: hidden;
      user-select: none;
    }
    .card {
      background: rgba(255,255,255,0.92);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.1);
      max-width: 90vw;
      z-index: 1;
      animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes pop { from { transform: scale(0.85); opacity: 0; } }
    .emoji { font-size: 4rem; margin-bottom: 0.8rem; }
    h1 { color: #6c5ce7; font-size: clamp(1.3rem,5vw,1.85rem); margin-bottom: 0.5rem; }
    .sub { color: #999; margin-bottom: 0.5rem; font-size: 0.95rem; }
    .sorry-list {
      text-align: left;
      margin: 1.2rem auto 2rem;
      max-width: 260px;
      color: #777;
      font-size: 0.88rem;
      line-height: 1.9;
    }
    .sorry-list li { list-style: none; }
    .sorry-list li::before { content: '🙇 '; }
    .buttons { display: flex; gap: 1.2rem; justify-content: center; min-height: 50px; }
    .btn {
      padding: 0.85rem 2rem;
      font-size: 1.05rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-yes {
      background: linear-gradient(135deg, #a29bfe, #6c5ce7);
      color: white;
      box-shadow: 0 6px 20px rgba(108,92,231,0.35);
      transition: transform 0.2s;
    }
    .btn-yes:hover { transform: scale(1.06); }
    .btn-no {
      position: fixed;
      background: #eee;
      color: #bbb;
      z-index: 10;
      transition: left 0.1s, top 0.1s;
    }
    .result { display: none; }
    .result.show { display: block; animation: pop 0.5s ease; }
    .result h2 { color: #6c5ce7; font-size: 1.6rem; margin: 1rem 0; }
    .result p { color: #666; line-height: 1.7; }
  </style>
</head>
<body>
  <div class="card">
    <div id="q">
      <div class="emoji">🥺</div>
      <h1>原谅我好不好？</h1>
      <p class="sub">我知道错了……</p>
      <ul class="sorry-list">
        <li>不该惹你生气</li>
        <li>不该已读不回</li>
        <li>不该说气话</li>
      </ul>
      <div class="buttons">
        <button class="btn btn-yes" id="yes">原谅你 💜</button>
        <button class="btn btn-no" id="no">不原谅</button>
      </div>
    </div>
    <div class="result" id="result">
      <div class="emoji">🫂</div>
      <h2>谢谢你～</h2>
      <p>我保证以后更乖<br>爱你，比昨天多一点 💜</p>
    </div>
  </div>
  <script>
    const no = document.getElementById('no');
    const yes = document.getElementById('yes');
    let mx = innerWidth/2, my = innerHeight/2, nx, ny;
    const texts = ['不原谅','真的不？','再想想','别嘛','最后一次机会'];

    function init() {
      const y = yes.getBoundingClientRect();
      nx = y.right + 16; ny = y.top;
      no.style.left = nx+'px'; no.style.top = ny+'px';
    }

    function dodge() {
      const r = no.getBoundingClientRect();
      const cx = r.left+r.width/2, cy = r.top+r.height/2;
      const dx = cx-mx, dy = cy-my, d = Math.hypot(dx,dy);
      if (d < 115 && d > 0) {
        const f = (115-d)/115;
        nx += dx/d*f*48; ny += dy/d*f*48;
        nx = Math.max(5, Math.min(nx, innerWidth-r.width-5));
        ny = Math.max(5, Math.min(ny, innerHeight-r.height-5));
        no.style.left = nx+'px'; no.style.top = ny+'px';
      }
    }

    let clickCount = 0;
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; dodge(); });
    document.addEventListener('touchmove', e => {
      if (e.touches[0]) { mx=e.touches[0].clientX; my=e.touches[0].clientY; dodge(); }
    }, { passive: true });

    no.addEventListener('click', e => {
      e.preventDefault();
      clickCount++;
      no.textContent = texts[Math.min(clickCount, texts.length-1)];
      const a = Math.random()*6.28;
      nx += Math.cos(a)*95; ny += Math.sin(a)*95;
      dodge();
    });

    yes.addEventListener('click', () => {
      document.getElementById('q').style.display = 'none';
      document.getElementById('result').classList.add('show');
      no.style.display = 'none';
    });

    addEventListener('load', () => setTimeout(init, 100));
    addEventListener('resize', init);
  </script>
</body>
</html>
