<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <script src="js/mobile-boot.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="description" content="我们的日历 — 记录特殊日期与纪念日">
  <title>日历 · 我们俩</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="calendar-page">
  <header class="site-header">
    <nav class="nav container">
      <a href="index.html" class="logo">我们俩</a>
      <button class="nav-toggle" aria-label="打开菜单" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="blog.html">博客</a></li>
        <li><a href="projects.html">作品</a></li>
        <li><a href="menu.html">点菜</a></li>
        <li><a href="calendar.html" class="active">日历</a></li>
        <li><a href="photos.html">相册</a></li>
        <li><a href="about.html">关于</a></li>
        <li><a href="contact.html">联系</a></li>
      </ul>
      <button class="theme-toggle" aria-label="切换主题">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>
  </header>

  <main>
    <div class="page-header container">
      <h1>我们的日历 📅</h1>
      <p>纪念日、生日、第一次……那些值得记住的日子。</p>
    </div>

    <section class="section calendar-section">
      <div class="container calendar-layout">
        <div class="calendar-main">
          <div class="calendar-toolbar">
            <button type="button" class="cal-nav-btn" id="cal-prev" aria-label="上个月">‹</button>
            <h2 class="cal-month-title" id="cal-month-title"></h2>
            <button type="button" class="cal-nav-btn" id="cal-next" aria-label="下个月">›</button>
            <button type="button" class="btn btn-secondary btn-sm" id="cal-today">今天</button>
          </div>

          <div class="calendar-grid">
            <div class="cal-weekdays">
              <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
            </div>
            <div class="cal-days" id="cal-days"></div>
          </div>

          <div class="cal-legend">
            <span><i class="dot dot-anniversary"></i>纪念日</span>
            <span><i class="dot dot-birthday"></i>生日</span>
            <span><i class="dot dot-travel"></i>旅行</span>
            <span><i class="dot dot-other"></i>其他</span>
          </div>
        </div>

        <aside class="calendar-sidebar">
          <div class="cal-panel">
            <h3>即将到来</h3>
            <ul class="upcoming-list" id="upcoming-list">
              <li class="upcoming-empty">还没有特殊日期</li>
            </ul>
          </div>

          <div class="cal-panel">
            <h3>添加特殊日期</h3>
            <form id="date-form">
              <div class="form-group">
                <label for="date-title">名称</label>
                <input type="text" id="date-title" required placeholder="比如：结婚纪念日" maxlength="30">
              </div>
              <div class="form-group">
                <label for="date-value">日期</label>
                <input type="date" id="date-value" required>
              </div>
              <div class="form-group">
                <label for="date-type">类型</label>
                <select id="date-type" required>
                  <option value="anniversary">纪念日</option>
                  <option value="birthday">生日</option>
                  <option value="travel">旅行</option>
                  <option value="other">其他</option>
                </select>
              </div>
              <div class="form-group">
                <label for="date-emoji">图标（可选）</label>
                <input type="text" id="date-emoji" placeholder="💕" maxlength="4">
              </div>
              <div class="form-group">
                <label for="date-note">备注（可选）</label>
                <textarea id="date-note" rows="2" placeholder="写点想记住的事…" maxlength="200"></textarea>
              </div>
              <label class="cal-checkbox">
                <input type="checkbox" id="date-yearly" checked>
                <span>每年重复（生日、纪念日等）</span>
              </label>
              <button type="submit" class="btn btn-primary btn-block" id="date-submit">保存</button>
              <button type="button" class="btn btn-secondary btn-block hidden" id="date-cancel-edit">取消编辑</button>
            </form>
          </div>
        </aside>
      </div>

      <div class="container all-dates-section">
        <h2>全部特殊日期</h2>
        <ul class="all-dates-list" id="all-dates-list">
          <li class="all-dates-empty">点击日历上的日期，或上方表单添加第一个特殊日期吧</li>
        </ul>
      </div>
    </section>
  </main>

  <dialog class="cal-dialog" id="day-dialog">
    <div class="cal-dialog-inner">
      <button type="button" class="cal-dialog-close" id="dialog-close" aria-label="关闭">×</button>
      <h3 id="dialog-date-title"></h3>
      <ul class="dialog-events" id="dialog-events"></ul>
      <button type="button" class="btn btn-primary btn-block" id="dialog-add-btn">在这天添加日期</button>
    </div>
  </dialog>

  <div class="toast" id="toast" hidden></div>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p class="footer-backup"><a href="settings.html">🛡️ 数据备份与恢复</a></p>
      <p>&copy; 2026 小明 &amp; 小雨. 用爱发电.</p>
      <div class="social-links">
        <a href="#">Instagram</a>
        <a href="#">小红书</a>
        <a href="#">GitHub</a>
      </div>
    </div>
  </footer>

  <script src="js/backup.js"></script>
  <script src="js/cloud-sync.js"></script>
  <script src="js/mobile.js"></script>
  <script src="js/main.js"></script>
  <script src="js/calendar.js"></script>
</body>
</html>
