<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可以亲亲我吗？</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, #ff758c, #ff7eb3);
      overflow: hidden;
      user-select: none;
    }
    .card {
      background: rgba(255,255,255,0.93);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      max-width: 90vw;
      animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 1;
    }
    @keyframes pop { from { transform: scale(0.8); opacity: 0; } }
    .emoji { font-size: 5rem; margin-bottom: 1rem; }
    h1 { color: #d63384; font-size: clamp(1.4rem,5vw,2rem); margin-bottom: 0.5rem; }
    .sub { color: #999; margin-bottom: 2.5rem; font-size: 0.95rem; }
    .buttons { display: flex; gap: 1.2rem; justify-content: center; min-height: 50px; }
    .btn {
      padding: 0.85rem 2rem;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-yes {
      background: linear-gradient(135deg, #ff6b9d, #e84393);
      color: white;
      box-shadow: 0 6px 20px rgba(232,67,147,0.4);
      transition: transform 0.2s;
    }
    .btn-yes:hover { transform: scale(1.08); }
    .btn-no {
      position: fixed;
      background: #f0f0f0;
      color: #bbb;
      z-index: 10;
      transition: left 0.1s, top 0.1s, transform 0.2s;
    }
    .result { display: none; }
    .result.show { display: block; animation: pop 0.5s ease; }
    .result h2 { color: #d63384; font-size: 1.7rem; margin: 1rem 0; }
    .result p { color: #666; line-height: 1.7; }
    .kiss-rain {
      position: fixed;
      font-size: 2rem;
      pointer-events: none;
      z-index: 50;
      animation: rain 2.5s linear forwards;
    }
    @keyframes rain {
      to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
    .yes-growing { transition: transform 0.3s; }
  </style>
</head>
<body>
  <div class="card">
    <div id="q">
      <div class="emoji">😘</div>
      <h1>可以亲亲我吗？</h1>
      <p class="sub">就一下下……好不好嘛</p>
      <div class="buttons">
        <button class="btn btn-yes yes-growing" id="yes">可以 💋</button>
        <button class="btn btn-no" id="no">不行</button>
      </div>
    </div>
    <div class="result" id="result">
      <div class="emoji">💏</div>
      <h2>mua～ 收到！</h2>
      <p>那说好了哦<br>见面要兑现的 😳</p>
    </div>
  </div>
  <script>
    const no = document.getElementById('no');
    const yes = document.getElementById('yes');
    let mx = innerWidth/2, my = innerHeight/2, nx, ny;
    let yesScale = 1;
    let attempts = 0;

    function init() {
      const y = yes.getBoundingClientRect();
      nx = y.right + 16; ny = y.top;
      no.style.left = nx + 'px'; no.style.top = ny + 'px';
    }

    function dodge() {
      const r = no.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      const dx = cx - mx, dy = cy - my, d = Math.hypot(dx, dy);
      if (d < 130 && d > 0) {
        const f = (130 - d) / 130;
        nx += dx/d * f * 50; ny += dy/d * f * 50;
        nx = Math.max(5, Math.min(nx, innerWidth - r.width - 5));
        ny = Math.max(5, Math.min(ny, innerHeight - r.height - 5));
        no.style.left = nx+'px'; no.style.top = ny+'px';
        attempts++;
        if (attempts % 5 === 0) {
          yesScale += 0.08;
          yes.style.transform = `scale(${yesScale})`;
        }
        if (attempts > 15) {
          no.style.fontSize = Math.max(0.7, 1.1 - attempts * 0.02) + 'rem';
          no.style.padding = '0.5rem 1rem';
        }
      }
    }

    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; dodge(); });
    document.addEventListener('touchmove', e => {
      if (e.touches[0]) { mx=e.touches[0].clientX; my=e.touches[0].clientY; dodge(); }
    }, { passive: true });

    no.addEventListener('click', e => {
      e.preventDefault();
      const a = Math.random() * 6.28;
      nx += Math.cos(a)*90; ny += Math.sin(a)*90;
      dodge();
    });

    yes.addEventListener('click', () => {
      document.getElementById('q').style.display = 'none';
      document.getElementById('result').classList.add('show');
      no.style.display = 'none';
      for (let i = 0; i < 30; i++) {
        setTimeout(() => {
          const k = document.createElement('div');
          k.className = 'kiss-rain';
          k.textContent = ['💋','😘','💕','❤️'][i%4];
          k.style.left = Math.random()*100+'vw';
          k.style.animationDuration = (2+Math.random())+'s';
          document.body.appendChild(k);
          setTimeout(() => k.remove(), 3000);
        }, i*80);
      }
    });

    addEventListener('load', () => setTimeout(init, 100));
    addEventListener('resize', init);
  </script>
</body>
</html>
