name: Deploy Cloud Sync Worker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy sync worker
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          npm install -g wrangler
          if grep -q "REPLACE_WITH_KV_ID" wrangler.toml; then
            KV_OUT=$(npx wrangler kv namespace create SYNC_KV 2>&1)
            echo "$KV_OUT"
            KV_ID=$(echo "$KV_OUT" | grep -oE '[a-f0-9]{32}' | head -1)
            sed -i "s/REPLACE_WITH_KV_ID/$KV_ID/" wrangler.toml
          fi
          DEPLOY_OUT=$(npx wrangler deploy 2>&1)
          echo "$DEPLOY_OUT"
          SYNC_URL=$(echo "$DEPLOY_OUT" | grep -oE 'https://[a-zA-Z0-9-]+\.workers\.dev' | head -1)
          if [ -z "$SYNC_URL" ]; then
            echo "Failed to get worker URL"
            exit 1
          fi
          echo "sync_url=$SYNC_URL" >> $GITHUB_OUTPUT
          cd ..
          export SYNC_URL
          node -e "
          const fs = require('fs');
          const url = process.env.SYNC_URL;
          let text = fs.readFileSync('js/sync-config.js', 'utf8');
          text = text.replace(/syncUrl:\s*\"[^\"]*\"/, 'syncUrl: \"' + url + '\"');
          text = text.replace(/firebaseUrl:\s*\"[^\"]*\"/, 'firebaseUrl: \"\"');
          fs.writeFileSync('js/sync-config.js', text);
          "

      - name: Commit and push sync config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/sync-config.js worker/wrangler.toml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "自动配置云同步地址"
          git push
